name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_DEFAULT: "3.11"
  DOCKER_IMAGE: voice-vision-assistant

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Security & Secrets Scan
  # ─────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify .env has no real API keys
        run: |
          if [ -f .env ]; then
            # Check for patterns that look like real API keys (long alphanumeric strings)
            if grep -E '=\s*[A-Za-z0-9_-]{20,}' .env | grep -v '=your_' | grep -v '=false' | grep -v '=true' | grep -v '#'; then
              echo "::error::Real API keys detected in .env file"
              exit 1
            fi
          fi

      - name: Run detect-secrets scan
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files '\.env\.example$' > .secrets-baseline.json
          detect-secrets audit --report --json .secrets-baseline.json

  # ─────────────────────────────────────────────
  # Stage 2: Lint & Format Check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Boundaries
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Ruff lint check
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Import boundary enforcement
        run: lint-imports

  # ─────────────────────────────────────────────
  # Stage 3: Type Check (Recommended)
  # ─────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    continue-on-error: true  # Not yet configured; allow failure until mypy/pyright is set up
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyright

      - name: Run pyright
        run: pyright --outputjson || true
        # Note: Type checker is not yet fully configured (ISSUE-006).
        # This stage is advisory-only until type annotations are complete.

  # ─────────────────────────────────────────────
  # Stage 4: Unit Tests (Python Matrix)
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libzbar0 ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-timeout

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short -q --timeout=60 --junitxml=test-results/unit-${{ matrix.python-version }}.xml
        env:
          SPATIAL_PERCEPTION_ENABLED: "false"
          ENABLE_QR_SCANNING: "false"
          MEMORY_ENABLED: "false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: test-results/

  # ─────────────────────────────────────────────
  # Stage 5: Integration Tests
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libzbar0 ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-timeout

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short -q --timeout=120 --junitxml=test-results/integration.xml
        env:
          SPATIAL_PERCEPTION_ENABLED: "false"
          MEMORY_ENABLED: "false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/

  # ─────────────────────────────────────────────
  # Stage 6: GPU Tests (Optional, Self-Hosted Runner)
  # ─────────────────────────────────────────────
  gpu-tests:
    name: GPU Tests
    runs-on: [self-hosted, gpu, linux]
    needs: [unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true  # GPU runner may not be available
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-timeout

      - name: Verify CUDA availability
        run: python -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'"

      - name: Run GPU-marked tests
        run: pytest tests/ -m gpu --timeout=300 -v --tb=short
        env:
          SPATIAL_USE_YOLO: "true"
          SPATIAL_USE_MIDAS: "true"
          YOLO_MODEL_PATH: models/yolov8n.onnx
          MIDAS_MODEL_PATH: models/midas_v21_small_256.onnx

  # ─────────────────────────────────────────────
  # Stage 7: Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pip-audit safety

      - name: Run pip-audit for dependency vulnerabilities
        run: pip-audit --strict --output json > security-results/pip-audit.json || true

      - name: Run safety check
        run: safety check --json > security-results/safety.json || true

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: security-results/

  # ─────────────────────────────────────────────
  # Stage 8: OpenAPI Validation
  # ─────────────────────────────────────────────
  openapi-validation:
    name: OpenAPI Spec Validation
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Install openapi-spec-validator
        run: pip install openapi-spec-validator

      - name: Validate OpenAPI spec
        run: |
          if [ -f docs/PRD/06_api/openapi.yaml ]; then
            python -c "
            from openapi_spec_validator import validate
            from openapi_spec_validator.readers import read_from_filename
            spec_dict, _ = read_from_filename('docs/PRD/06_api/openapi.yaml')
            validate(spec_dict)
            print('OpenAPI spec is valid')
            "
          else
            echo "::warning::OpenAPI spec not found at docs/PRD/06_api/openapi.yaml"
          fi

  # ─────────────────────────────────────────────
  # Stage 9: Docker Build & Smoke Test
  # ─────────────────────────────────────────────
  build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, lint, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (canonical Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container health check
        run: |
          # Start container in background with minimal config
          docker run -d --name smoke-test \
            -p 8000:8000 \
            -e MEMORY_ENABLED=false \
            -e SPATIAL_PERCEPTION_ENABLED=false \
            -e ENABLE_QR_SCANNING=false \
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

          # Wait for startup
          sleep 15

          # Check health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
          echo "Health check returned: $HTTP_STATUS"

          # Cleanup
          docker logs smoke-test
          docker stop smoke-test
          docker rm smoke-test

          # Fail if health check didn't return 200
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Smoke test failed — health check returned $HTTP_STATUS"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Stage 10: Artifact Publish (Main Branch Only)
  # ─────────────────────────────────────────────
  artifact-publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])" 2>/dev/null || echo "0.0.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
