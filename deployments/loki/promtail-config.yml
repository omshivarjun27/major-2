# Voice & Vision Assistant - Loki Configuration
# Task: T-094 - Structured Logging Enhancement
#
# Grafana Loki is a log aggregation system designed to work with Prometheus.
# This configuration is for Promtail, the log shipper that sends logs to Loki.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Voice Vision API logs
  - job_name: voice-vision-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: voice-vision-api
          service: api
          __path__: /var/log/voice-vision/api/*.log
    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
            correlation_id: correlation_id
            session_id: session_id
            service_name: service_name
            component: component
            latency_ms: latency_ms
            event: event
      
      # Set timestamp from log
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      
      # Add labels from parsed JSON
      - labels:
          level:
          correlation_id:
          session_id:
          component:
          event:
      
      # Drop debug logs in production (optional)
      # - match:
      #     selector: '{level="DEBUG"}'
      #     action: drop

  # Voice Vision Agent logs
  - job_name: voice-vision-agent
    static_configs:
      - targets:
          - localhost
        labels:
          job: voice-vision-agent
          service: agent
          __path__: /var/log/voice-vision/agent/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
            correlation_id: correlation_id
            session_id: session_id
            service_name: service_name
            component: component
            latency_ms: latency_ms
            event: event
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          correlation_id:
          session_id:
          component:
          event:

  # Docker container logs (if using Docker)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
            correlation_id: correlation_id
      - labels:
          level:
          correlation_id:
