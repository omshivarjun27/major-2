# Grafana Dashboard Provisioning Configuration

apiVersion: 1

providers:
  - name: Voice Vision Dashboards
    orgId: 1
    folder: Voice Vision
    folderUid: voice-vision
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/voice-vision
