# Voice & Vision Assistant - Alertmanager Configuration
# Task: T-093 - Alert Rules Configuration

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@voice-vision.example.com'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'

# Route tree for alert routing
route:
  # Default receiver
  receiver: 'default-webhook'
  
  # Group alerts by alertname and service
  group_by: ['alertname', 'service', 'component']
  
  # Wait time before sending first notification
  group_wait: 30s
  
  # Wait time before sending updated notification
  group_interval: 5m
  
  # Minimum wait time before re-sending notification
  repeat_interval: 4h
  
  # Child routes for severity-based routing
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true
    
    # Warning alerts - less urgent
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 1m
      repeat_interval: 4h
    
    # Circuit breaker alerts - specific channel
    - match:
        component: resilience
      receiver: 'resilience-alerts'
      group_by: ['alertname', 'service']
    
    # Resource alerts
    - match_re:
        component: ^(gpu|cpu|memory)$
      receiver: 'resource-alerts'

# Inhibition rules to prevent alert storms
inhibit_rules:
  # If critical alert fires, suppress warning for same issue
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']
  
  # If service is down, suppress its performance alerts
  - source_match:
      alertname: 'CircuitBreakerOpen'
    target_match_re:
      alertname: '.*SLAViolation'
    equal: ['service']

# Receiver definitions
receivers:
  # Default webhook receiver
  - name: 'default-webhook'
    webhook_configs:
      - url: 'http://localhost:8080/webhook/alerts'
        send_resolved: true
        http_config:
          basic_auth:
            username: '${WEBHOOK_USERNAME}'
            password: '${WEBHOOK_PASSWORD}'

  # Critical alerts - webhook + email
  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://localhost:8080/webhook/critical'
        send_resolved: true
    email_configs:
      - to: 'oncall@voice-vision.example.com'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] Voice Vision Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2>Critical Alert: {{ .GroupLabels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          <p><strong>Component:</strong> {{ .CommonLabels.component }}</p>
          {{ range .Alerts }}
          <hr>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          {{ if .Annotations.runbook_url }}
          <p><a href="{{ .Annotations.runbook_url }}">Runbook</a></p>
          {{ end }}
          {{ end }}

  # Warning alerts - webhook only
  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://localhost:8080/webhook/warning'
        send_resolved: true

  # Resilience alerts (circuit breakers)
  - name: 'resilience-alerts'
    webhook_configs:
      - url: 'http://localhost:8080/webhook/resilience'
        send_resolved: true
    email_configs:
      - to: 'platform@voice-vision.example.com'
        send_resolved: true
        headers:
          Subject: '[RESILIENCE] {{ .GroupLabels.service }} - {{ .GroupLabels.alertname }}'

  # Resource alerts
  - name: 'resource-alerts'
    webhook_configs:
      - url: 'http://localhost:8080/webhook/resources'
        send_resolved: true

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'
