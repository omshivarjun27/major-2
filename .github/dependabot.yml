# ================================================================
# Dependabot Configuration
# ================================================================
# Automatically checks for outdated dependencies and creates PRs.
# ================================================================

version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - codingaslu
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "deps"
      include: scope
    ignore:
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "torchvision"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /deployments/docker
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
