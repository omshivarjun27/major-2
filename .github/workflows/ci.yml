name: CI – Voice & Vision Assistant

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run secrets scan
        run: |
          python -m pytest tests/performance/test_secrets_scan.py -v --tb=short -q

      - name: Verify .env not committed with real keys
        run: |
          if [ -f .env ]; then
            echo "WARNING: .env file found in repo"
            # Check for patterns that look like real API keys (long alphanumeric strings)
            if grep -P '=[a-zA-Z0-9]{20,}' .env | grep -vP '=(your_|ollama$|true$|false$|qwen3-embedding)'; then
              echo "FAIL: .env appears to contain real API keys"
              exit 1
            fi
          fi
          echo "Secrets scan passed"

  test:
    runs-on: ubuntu-latest
    needs: secrets-scan
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libzbar0 ffmpeg

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-extras.txt || true
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short -q --timeout=60

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v --tb=short -q --timeout=120

      - name: Run all tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing --timeout=180
        continue-on-error: false

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Run NFR tests
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest tests/performance/ -v --tb=short -q --timeout=300

      - name: Generate benchmark report
        if: matrix.python-version == '3.11'
        run: |
          python -c "
          from tests.performance.test_benchmark_report import TestBenchmarkReport
          import json
          tb = TestBenchmarkReport()
          report = tb._generate_report()
          with open('benchmark_report.json', 'w') as f:
              json.dump(report, f, indent=2)
          print('Benchmark report generated')
          "

      - name: Upload benchmark report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark_report.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff import-linter

      - name: Install project (editable)
        run: pip install -e . --no-deps

      - name: Run ruff check
        run: ruff check . --output-format=github

      - name: Check architectural boundaries
        run: lint-imports

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install "bandit[toml]>=1.7.0"

      - name: Run SAST scan
        run: |
          bandit -r shared core application infrastructure apps \
            -c pyproject.toml \
            -f json -o bandit_report.json \
            --severity-level medium \
            --exit-zero

      - name: Check for critical findings
        run: |
          python -c "
          import json, sys
          with open('bandit_report.json') as f:
              report = json.load(f)
          critical = [r for r in report.get('results', [])
                      if r['issue_severity'] in ('HIGH',)]
          if critical:
              for r in critical:
                  print(f\"FAIL: {r['issue_severity']} - {r['issue_text']} in {r['filename']}:{r['line_number']}\")
              sys.exit(1)
          print(f\"SAST passed: {len(report.get('results', []))} findings, 0 high/critical\")
          "

      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit_report.json
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pip-audit>=2.6.0"
          pip install -r requirements.txt
          pip install -r requirements-extras.txt || true

      - name: Scan core dependencies
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --output pip_audit_core.json \
            --desc on \
            || true

      - name: Scan extra dependencies
        run: |
          pip-audit -r requirements-extras.txt \
            --format json \
            --output pip_audit_extras.json \
            --desc on \
            || true

      - name: Check for critical vulnerabilities
        run: |
          python -c "
          import json, sys

          def check_report(path, label):
              try:
                  with open(path) as f:
                      report = json.load(f)
              except FileNotFoundError:
                  print(f'{label}: No report generated')
                  return []
              vulns = report.get('dependencies', [])
              critical = []
              for dep in vulns:
                  for vuln in dep.get('vulns', []):
                      vid = vuln.get('id', 'UNKNOWN')
                      fix = vuln.get('fix_versions', [])
                      critical.append({
                          'package': dep['name'],
                          'version': dep['version'],
                          'vuln_id': vid,
                          'fix': fix,
                      })
              return critical

          core_vulns = check_report('pip_audit_core.json', 'Core')
          extra_vulns = check_report('pip_audit_extras.json', 'Extras')
          all_vulns = core_vulns + extra_vulns

          if all_vulns:
              print(f'Found {len(all_vulns)} vulnerability(ies):')
              for v in all_vulns:
                  fix_str = ', '.join(v['fix']) if v['fix'] else 'no fix available'
                  print(f\"  {v['package']}=={v['version']}: {v['vuln_id']} (fix: {fix_str})\")
              fixable = [v for v in all_vulns if v['fix']]
              if fixable:
                  print(f'FAIL: {len(fixable)} fixable vulnerabilities found')
                  sys.exit(1)
              else:
                  print(f'WARN: {len(all_vulns)} vulnerabilities with no fix available (non-blocking)')
          else:
              print('No known vulnerabilities found')
          "

      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-reports
          path: |
            pip_audit_core.json
            pip_audit_extras.json

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t voice-vision-assistant:latest .

      - name: Verify Docker image
        run: docker run --rm voice-vision-assistant:latest python -c "import core; print('OK')"

      - name: Smoke test – OCR backends available
        run: |
          docker run --rm voice-vision-assistant:latest python -c "
          from core.ocr import OCRPipeline
          p = OCRPipeline()
          assert p.is_ready, 'OCR pipeline has no backend — easyocr or pytesseract missing in container'
          print('OCR backend OK:', p._backend_name)
          "

      - name: Smoke test – API health endpoint
        run: |
          # Start container in background, test /health, then stop
          docker run -d --name smoke-test -p 8000:8000 \
            -e LIVEKIT_URL=ws://localhost:7880 \
            -e LIVEKIT_API_KEY=devkey \
            -e LIVEKIT_API_SECRET=devsecret \
            -e DEEPGRAM_API_KEY=test \
            -e ELEVEN_API_KEY=test \
            voice-vision-assistant:latest \
            uvicorn apps.api.server:app --host 0.0.0.0 --port 8000
          # Wait for startup
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health endpoint OK"
              break
            fi
            echo "Waiting for API server... ($i/30)"
            sleep 2
          done
          # Assert health returns ok
          HEALTH=$(curl -sf http://localhost:8000/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'Bad status: {d}'; print('SMOKE TEST PASSED')"
          docker stop smoke-test
          docker rm smoke-test
